name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-integration:
    name: Backend Integration (Phase 7 Sync)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hivemind
          POSTGRES_PASSWORD: hivemind
          POSTGRES_DB: hivemind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hivemind -d hivemind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://hivemind:hivemind@localhost:5432/hivemind
      DATABASE_URL_SYNC: postgresql+psycopg2://hivemind:hivemind@localhost:5432/hivemind
      TESTING: "true"
      HIVEMIND_YOUTRACK_URL: https://youtrack.invalid
      HIVEMIND_YOUTRACK_TOKEN: test-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
        working-directory: backend

      - name: Apply migrations
        run: alembic upgrade head
        working-directory: backend

      - name: Run Phase 7 integration tests
        run: |
          pytest tests/integration/test_phase7_outbox_flow.py \
                 tests/integration/test_inbound_webhook_to_triage.py \
                 tests/integration/test_dlq_requeue_to_outbound_consumer.py \
                 -v --tb=short
        working-directory: backend

  nexus-grid-perf:
    name: Nexus Grid Perf (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Run Nexus Grid performance test
        run: npm run test:perf:nexus
        working-directory: frontend

  lighthouse-perf:
    name: Lighthouse Perf Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          npx --yes wait-on http://127.0.0.1:4173
        working-directory: frontend

      - name: Lighthouse CI (Warning only in Phase 7)
        id: lighthouse
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./frontend/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
