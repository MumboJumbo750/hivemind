services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hivemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hivemind}
      POSTGRES_DB: ${POSTGRES_DB:-hivemind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hivemind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hivemind}:${POSTGRES_PASSWORD:-hivemind}@postgres:5432/${POSTGRES_DB:-hivemind}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-hivemind}:${POSTGRES_PASSWORD:-hivemind}@postgres:5432/${POSTGRES_DB:-hivemind}
      HIVEMIND_MODE: ${HIVEMIND_MODE:-solo}
      HIVEMIND_TOKEN_BUDGET: ${HIVEMIND_TOKEN_BUDGET:-8000}
      HIVEMIND_ROUTING_THRESHOLD: ${HIVEMIND_ROUTING_THRESHOLD:-0.85}
      HIVEMIND_DLQ_MAX_ATTEMPTS: ${HIVEMIND_DLQ_MAX_ATTEMPTS:-5}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
      HIVEMIND_CORS_ORIGINS: ${HIVEMIND_CORS_ORIGINS:-http://localhost:5173}
      HIVEMIND_OLLAMA_URL: ${HIVEMIND_OLLAMA_URL:-http://ollama:11434}
      HIVEMIND_EMBEDDING_MODEL: ${HIVEMIND_EMBEDDING_MODEL:-nomic-embed-text}
      HIVEMIND_EMBEDDING_BATCH_SIZE: ${HIVEMIND_EMBEDDING_BATCH_SIZE:-50}
      HIVEMIND_KEY_PASSPHRASE: ${HIVEMIND_KEY_PASSPHRASE:-hivemind-dev-key-2026}
      HIVEMIND_CONDUCTOR_ENABLED: ${HIVEMIND_CONDUCTOR_ENABLED:-true}
      HIVEMIND_AUTO_REVIEW_GRACE_MINUTES: ${HIVEMIND_AUTO_REVIEW_GRACE_MINUTES:-30}
      HIVEMIND_GOVERNANCE_AUTO_PROMOTION_ENABLED: ${HIVEMIND_GOVERNANCE_AUTO_PROMOTION_ENABLED:-false}
      HIVEMIND_GOVERNANCE_AUTO_PROMOTION_MIN_CONSECUTIVE_APPROVES: ${HIVEMIND_GOVERNANCE_AUTO_PROMOTION_MIN_CONSECUTIVE_APPROVES:-10}
      HIVEMIND_GOVERNANCE_AUTO_PROMOTION_MIN_CONFIDENCE: ${HIVEMIND_GOVERNANCE_AUTO_PROMOTION_MIN_CONFIDENCE:-0.9}
      HIVEMIND_GOVERNANCE_AUTO_PROMOTION_EVALUATION_WINDOW_DAYS: ${HIVEMIND_GOVERNANCE_AUTO_PROMOTION_EVALUATION_WINDOW_DAYS:-30}
      HIVEMIND_WORKSPACE_ROOT: /workspace
      PYTHONPATH: /app:/workspace
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./seed:/seed:ro
      - ./:/workspace

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}

  db-backup:
    build: ./backend/cron
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-hivemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hivemind}
      POSTGRES_DB: ${POSTGRES_DB:-hivemind}
      PGPASSWORD: ${POSTGRES_PASSWORD:-hivemind}
      HIVEMIND_BACKUP_CRON: ${HIVEMIND_BACKUP_CRON:-0 2 * * *}
      HIVEMIND_BACKUP_DIR: ${HIVEMIND_BACKUP_DIR:-/backups}
      HIVEMIND_BACKUP_RETAIN_DAILY: ${HIVEMIND_BACKUP_RETAIN_DAILY:-7}
      HIVEMIND_BACKUP_RETAIN_WEEKLY: ${HIVEMIND_BACKUP_RETAIN_WEEKLY:-4}
      HIVEMIND_BACKUP_RETAIN_MONTHLY: ${HIVEMIND_BACKUP_RETAIN_MONTHLY:-3}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # NOTE: Ollama is NOT included in Phase 1-2.
  # It will be added in Phase 3 when the Bibliothekar service is automated.
  # Placeholder:
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  # Phase 3: Ollama for Embeddings (--profile ai)
  ollama:
    image: ollama/ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ollama-init:
    image: curlimages/curl:latest
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "curl -s http://ollama:11434/api/pull
      -d '{\"name\": \"nomic-embed-text\"}' --max-time 600"

volumes:
  postgres_data:
  backup_data:
  backend_venv:
  frontend_node_modules:
  ollama_data:
