services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hivemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hivemind}
      POSTGRES_DB: ${POSTGRES_DB:-hivemind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hivemind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hivemind}:${POSTGRES_PASSWORD:-hivemind}@postgres:5432/${POSTGRES_DB:-hivemind}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-hivemind}:${POSTGRES_PASSWORD:-hivemind}@postgres:5432/${POSTGRES_DB:-hivemind}
      HIVEMIND_MODE: ${HIVEMIND_MODE:-solo}
      HIVEMIND_TOKEN_BUDGET: ${HIVEMIND_TOKEN_BUDGET:-8000}
      HIVEMIND_ROUTING_THRESHOLD: ${HIVEMIND_ROUTING_THRESHOLD:-0.85}
      HIVEMIND_DLQ_MAX_ATTEMPTS: ${HIVEMIND_DLQ_MAX_ATTEMPTS:-5}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

  # NOTE: Ollama is NOT included in Phase 1-2.
  # It will be added in Phase 3 when the Bibliothekar service is automated.
  # Placeholder:
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  postgres_data:
