[tool.ruff]
target-version = "py311"
line-length = 100
src = ["app"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "N",   # pep8-naming
    "C4",  # flake8-comprehensions
    "T20", # flake8-print (no stray print statements)
]
ignore = [
    "E501", # line too long — ruff formatter handhabt das
    "B008", # do not perform function calls in default arguments (FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["E402", "F401"]
"scripts/*" = ["T20"] # print() in scripts erlaubt

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_any_generics = false
warn_return_any = true
warn_unused_ignores = true
exclude = ["alembic/"]
